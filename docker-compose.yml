version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: order-mgmt-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  server:
    build: ./server
    container_name: order-mgmt-server
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/order_mgmt
      - CLIENT_ORIGIN=http://localhost:3000
      - NODE_ENV=production
    depends_on:
      - mongo

  client:
    build:
      context: ./client
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:5000/api
        - NEXT_PUBLIC_SOCKET_URL=http://localhost:5000
    container_name: order-mgmt-client
    ports:
      - "3000:3000"
    depends_on:
      - server

volumes:
  mongo_data:
